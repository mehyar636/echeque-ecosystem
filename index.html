<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<title>E-Cheque Ecosystem · Digital Check Ecosystem</title>
<meta name="description" content="Patent-pending digital cheque infrastructure — Drawer, Beneficiary, and Bank Officer perspectives.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* =========================================================
   E-CHEQUE ECOSYSTEM — DESIGN SYSTEM
   Editorial luxury · Navy + Cream + Gold
   Bloomberg Terminal meets Mercury Bank
   ========================================================= */

:root {
  /* Brand */
  --navy:           #0a1628;
  --navy-2:         #142943;
  --navy-3:         #1f3a5f;
  --ink:            #0a1628;

  /* Cream/paper base */
  --cream:          #f8f5ee;
  --cream-2:        #f1ece0;
  --paper:          #fefcf7;

  /* Gold accent (used sparingly — bank seal, key actions) */
  --gold:           #c9a961;
  --gold-deep:      #a98933;
  --gold-soft:      #ede0bd;

  /* Modern accent (sparingly used — active states, links) */
  --accent:         #1e6f5c;       /* deep emerald — modern, trustworthy */
  --accent-soft:    #d6ebe2;

  /* Semantic */
  --success:        #1e6f5c;
  --success-soft:   #d6ebe2;
  --warn:           #c08a2a;
  --warn-soft:      #f5e8cc;
  --danger:         #a23030;
  --danger-soft:    #f3d8d8;
  --info:           #2e5d8a;
  --info-soft:      #d9e4f0;

  /* Neutrals */
  --line:           #e8e2d2;
  --line-strong:    #d4ccb6;
  --ink-soft:       #4a5468;
  --ink-faint:      #8b8674;
  --ink-faintest:   #b8b29a;

  /* Type */
  --font-display:   'Fraunces', Georgia, serif;
  --font-body:      'Inter', system-ui, sans-serif;
  --font-mono:      'JetBrains Mono', ui-monospace, monospace;
  --font-ar:        'Tajawal', system-ui, sans-serif;

  /* Spacing */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
  --s-9: 48px; --s-10: 64px; --s-11: 96px;

  /* Radii — restrained for banking gravitas */
  --r-sm: 4px; --r-md: 6px; --r-lg: 10px; --r-xl: 14px;

  /* Shadows */
  --shadow-sm:  0 1px 2px rgba(10, 22, 40, 0.04);
  --shadow-md:  0 2px 6px rgba(10, 22, 40, 0.06), 0 1px 2px rgba(10, 22, 40, 0.04);
  --shadow-lg:  0 8px 20px rgba(10, 22, 40, 0.08), 0 2px 6px rgba(10, 22, 40, 0.04);
  --shadow-xl:  0 24px 48px rgba(10, 22, 40, 0.12);

  --header-h:       64px;
  --gold-bar-h:     3px;
  --rolebar-h:      48px;
  --sidebar-w:      240px;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  min-height: 100vh;
  overflow-x: hidden;
}

img, svg { display: block; max-width: 100%; }
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor: pointer; border: 0; background: 0; }
a { color: inherit; text-decoration: none; }

::selection { background: var(--gold); color: var(--navy); }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }
.serif { font-family: var(--font-display); }
.tabular { font-variant-numeric: tabular-nums; }
.ar { font-family: var(--font-ar); direction: rtl; }

/* =========================================================
   LOADER
   ========================================================= */
.loader {
  position: fixed; inset: 0;
  background: var(--navy);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: var(--s-7);
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
.loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.loader-mark {
  width: 80px; height: 80px;
  border-radius: 12px;
  background: var(--navy-2);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  border: 1px solid var(--gold-deep);
}
.loader-mark::before {
  content: 'E'; font-family: var(--font-display); font-weight: 700;
  font-size: 44px; color: var(--gold);
  font-style: italic;
}
.loader-mark::after {
  content: ''; position: absolute; inset: -4px;
  border: 1px solid var(--gold);
  border-radius: 14px;
  opacity: 0.3;
  animation: loader-pulse 2s ease-in-out infinite;
}
@keyframes loader-pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.08); opacity: 0; }
}

.loader-brand {
  text-align: center;
  color: var(--cream);
}
.loader-title {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.loader-sub {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.18em;
  color: var(--gold);
  text-transform: uppercase;
}

.loader-progress {
  width: 280px; max-width: 80vw;
}
.loader-bar {
  height: 2px; background: rgba(255,255,255,0.1);
  border-radius: 1px; overflow: hidden;
}
.loader-fill {
  height: 100%; background: var(--gold);
  width: 0%;
  transition: width 0.35s ease;
}
.loader-status {
  margin-top: var(--s-3);
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.04em;
  text-align: center;
  min-height: 16px;
}

/* =========================================================
   APP SHELL
   ========================================================= */
.app { min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header {
  height: var(--header-h);
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 var(--s-7);
  position: sticky; top: 0; z-index: 50;
  gap: var(--s-7);
}

.brand {
  display: flex; align-items: center; gap: var(--s-3);
}
.brand-mark {
  width: 36px; height: 36px;
  background: var(--navy);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.brand-mark::before {
  content: 'E';
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  color: var(--gold);
  font-style: italic;
}
.brand-text { display: flex; flex-direction: column; line-height: 1; }
.brand-name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--navy);
}
.brand-sub {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 2px;
}

.header-spacer { flex: 1; }

.user-block {
  display: flex; align-items: center; gap: var(--s-3);
  padding-right: var(--s-2);
}
.user-text {
  text-align: right;
  display: flex; flex-direction: column;
  line-height: 1.15;
}
.user-name {
  font-size: 13px; font-weight: 600;
  color: var(--ink);
}
.user-role {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 2px;
}
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--navy);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  border: 1px solid var(--gold-deep);
}

/* Gold bar */
.gold-bar {
  height: var(--gold-bar-h);
  background: linear-gradient(90deg, var(--gold-deep) 0%, var(--gold) 50%, var(--gold-deep) 100%);
}

/* Role bar */
.rolebar {
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  height: var(--rolebar-h);
  display: flex;
  align-items: stretch;
  padding: 0 var(--s-7);
  gap: var(--s-1);
  position: sticky; top: var(--header-h); z-index: 49;
}
.role-tab {
  display: flex; align-items: center; gap: var(--s-2);
  padding: 0 var(--s-5);
  font-size: 13px; font-weight: 500;
  color: var(--ink-soft);
  border-bottom: 2px solid transparent;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.role-tab:hover { color: var(--ink); }
.role-tab.active {
  color: var(--navy);
  border-bottom-color: var(--gold);
  font-weight: 600;
}
.role-tab-num {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--cream-2);
  color: var(--ink-faint);
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 0.05em;
}
.role-tab.active .role-tab-num {
  background: var(--gold-soft);
  color: var(--gold-deep);
}

/* Body */
.body {
  flex: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
}

/* Sidebar */
.sidebar {
  background: var(--paper);
  border-right: 1px solid var(--line);
  padding: var(--s-6) 0;
  height: calc(100vh - var(--header-h) - var(--gold-bar-h) - var(--rolebar-h));
  position: sticky;
  top: calc(var(--header-h) + var(--gold-bar-h) + var(--rolebar-h));
  overflow-y: auto;
}

.sidebar-section {
  padding: 0 var(--s-5) var(--s-5);
}
.sidebar-section + .sidebar-section { border-top: 1px solid var(--line); padding-top: var(--s-5); }

.sidebar-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  padding: 0 var(--s-3);
  margin-bottom: var(--s-3);
}

.nav-item {
  display: flex; align-items: center; gap: var(--s-3);
  width: 100%; text-align: left;
  padding: 9px var(--s-3);
  border-radius: var(--r-md);
  font-size: 13px;
  color: var(--ink-soft);
  transition: all 0.12s;
  margin-bottom: 1px;
}
.nav-item:hover {
  background: var(--cream-2);
  color: var(--ink);
}
.nav-item.active {
  background: var(--navy);
  color: var(--cream);
  font-weight: 500;
}
.nav-item.active .nav-icon { opacity: 1; }
.nav-icon {
  width: 16px; height: 16px;
  opacity: 0.6;
  flex-shrink: 0;
}
.nav-item.active .nav-icon { opacity: 1; }

/* Main content */
.main {
  padding: var(--s-7) var(--s-9);
  min-width: 0;
  background: var(--cream);
}

.spinner-container {
  padding: var(--s-11) 0;
  display: flex; flex-direction: column;
  align-items: center; gap: var(--s-4);
  color: var(--ink-faint);
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--line);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================================
   PAGE HEADERS
   ========================================================= */
.page-head {
  margin-bottom: var(--s-7);
  padding-bottom: var(--s-5);
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: var(--s-5);
  flex-wrap: wrap;
}
.page-head-text { flex: 1; min-width: 0; }
.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--gold-deep);
  text-transform: uppercase;
  margin-bottom: var(--s-2);
  display: flex; align-items: center; gap: var(--s-2);
}
.page-eyebrow::before {
  content: ''; width: 16px; height: 1px;
  background: var(--gold);
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 3vw, 36px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--navy);
  margin-bottom: var(--s-2);
}
.page-sub {
  font-size: 14px;
  color: var(--ink-soft);
  max-width: 600px;
}

/* =========================================================
   CARDS
   ========================================================= */
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--line-strong); }

.card-header {
  padding: var(--s-4) var(--s-6);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s-4);
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--navy);
  display: flex; align-items: center; gap: var(--s-2);
}
.card-body { padding: var(--s-6); }
.card-body-tight { padding: var(--s-4) var(--s-6); }

/* =========================================================
   STAT CARDS
   ========================================================= */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--s-4);
  margin-bottom: var(--s-6);
}
.stat {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--s-5) var(--s-6);
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--navy);
  opacity: 0.08;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: var(--s-3);
}
.stat-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--navy);
  line-height: 1;
  display: flex; align-items: baseline; gap: 6px;
}
.stat-currency {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}
.stat-meta {
  margin-top: var(--s-3);
  font-size: 12px;
  color: var(--ink-soft);
  display: flex; align-items: center; gap: 6px;
}
.stat-trend-up { color: var(--success); }
.stat-trend-down { color: var(--danger); }

.stat-accent::before { background: var(--gold); opacity: 1; height: 3px; }
.stat-accent .stat-value { color: var(--gold-deep); }

/* =========================================================
   PROGRESS / METER BARS
   ========================================================= */
.meter {
  height: 6px;
  background: var(--cream-2);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.meter-fill {
  height: 100%;
  background: var(--navy);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.meter-fill.gold { background: var(--gold); }
.meter-fill.success { background: var(--success); }
.meter-fill.warn { background: var(--warn); }
.meter-fill.danger { background: var(--danger); }

.meter-row {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-3) 0;
  border-bottom: 1px solid var(--line);
}
.meter-row:last-child { border: 0; }
.meter-row-label {
  flex: 0 0 200px;
  font-size: 13px;
  color: var(--ink-soft);
}
.meter-row-bar { flex: 1; }
.meter-row-value {
  flex: 0 0 50px;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
}

/* =========================================================
   TABLES
   ========================================================= */
.table-wrap {
  overflow-x: auto;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
}
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.table th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  text-transform: uppercase;
  padding: var(--s-4) var(--s-5);
  background: var(--cream-2);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
.table td {
  padding: var(--s-4) var(--s-5);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  color: var(--ink);
}
.table tr:last-child td { border: 0; }
.table tr:hover td { background: var(--cream); }

/* =========================================================
   BADGES & PILLS
   ========================================================= */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
}
.badge-success { background: var(--success-soft); color: var(--success); }
.badge-success::before { background: var(--success); }
.badge-warn    { background: var(--warn-soft);    color: var(--warn-deep, var(--warn)); }
.badge-warn::before    { background: var(--warn); }
.badge-danger  { background: var(--danger-soft);  color: var(--danger); }
.badge-danger::before  { background: var(--danger); }
.badge-info    { background: var(--info-soft);    color: var(--info); }
.badge-info::before    { background: var(--info); }
.badge-gold    { background: var(--gold-soft);    color: var(--gold-deep); }
.badge-gold::before    { background: var(--gold); }

.type-instant { background: var(--info-soft); color: var(--info); }
.type-instant::before { background: var(--info); }
.type-deferred { background: var(--gold-soft); color: var(--gold-deep); }
.type-deferred::before { background: var(--gold); }

/* =========================================================
   FORMS
   ========================================================= */
.field { display: flex; flex-direction: column; gap: 6px; }
.field + .field { margin-top: var(--s-4); }

.label {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  display: flex; align-items: center; justify-content: space-between;
}

.input, .select, .textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  background: var(--paper);
  font-size: 14px;
  color: var(--ink);
  transition: all 0.12s;
  font-feature-settings: "tnum" 1;
}
.input:hover, .select:hover, .textarea:hover {
  border-color: var(--ink-faint);
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(10, 22, 40, 0.06);
}
.input[readonly] {
  background: var(--cream-2);
  color: var(--ink-soft);
  cursor: default;
}
.field-hint {
  font-size: 11px;
  color: var(--ink-faint);
  font-family: var(--font-mono);
}

/* =========================================================
   BUTTONS
   ========================================================= */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  transition: all 0.12s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn-primary {
  background: var(--navy);
  color: var(--cream);
  border-color: var(--navy);
}
.btn-primary:hover {
  background: var(--navy-2);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-gold {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold-deep);
  font-weight: 700;
}
.btn-gold:hover {
  background: var(--gold-deep);
  color: var(--cream);
}
.btn-ghost {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--line-strong);
}
.btn-ghost:hover { border-color: var(--navy); background: var(--cream-2); }
.btn-success { background: var(--success); color: white; border-color: var(--success); }
.btn-success:hover { background: #155845; }

// ---------- UTILITY HELPERS ----------
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);

function fmtMoney(n) {
  if (n == null || isNaN(n)) return 'JD —';
  return 'JD ' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtMoneyFull(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}
function fmtDate(d) {
  if (!d) return 'N/A';
  const date = new Date(d);
  if (isNaN(date)) return d;
  const dd = String(date.getDate()).padStart(2,'0');
  const mm = String(date.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${date.getFullYear()}`;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

function statusBadge(status) {
  const map = {
    active:    { cls: 'badge-success', label: 'Active' },
    collected: { cls: 'badge-info',    label: 'Collected' },
    deposited: { cls: 'badge-info',    label: 'Deposited' },
    pending:   { cls: 'badge-warn',    label: 'Pending' },
    bounced:   { cls: 'badge-danger',  label: 'Bounced' },
  };
  const m = map[status] || { cls: 'badge-info', label: status || '—' };
  return `<span class="badge ${m.cls}">${m.label}</span>`;
}
function typeBadge(t) {
  if (t === 'instant') return '<span class="badge type-instant">Instant</span>';
  if (t === 'deferred') return '<span class="badge type-deferred">Deferred</span>';
  return `<span class="badge">${t}</span>`;
}
function ratingColor(g) {
  return ({ 'A+':'var(--success)', 'A':'#27AE60', 'B':'var(--gold-deep)', 'C':'var(--warn)', 'D':'var(--danger)' })[g] || 'var(--ink-faint)';
}

// ---------- NUMBER → WORDS ----------
const ONES_EN = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const TENS_EN = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function below1000En(n) {
  if (n < 20) return ONES_EN[n];
  if (n < 100) return TENS_EN[Math.floor(n/10)] + (n%10 ? ' ' + ONES_EN[n%10] : '');
  return ONES_EN[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' ' + below1000En(n%100) : '');
}
function numberToWords(n) {
  n = Math.floor(Number(n) || 0);
  if (n === 0) return 'Zero';
  if (n < 1000) return below1000En(n);
  if (n < 1000000) return below1000En(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' ' + below1000En(n%1000) : '');
  return below1000En(Math.floor(n/1000000)) + ' Million' + (n%1000000 ? ' ' + numberToWords(n%1000000) : '');
}

const ONES_AR = ['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
const TENS_AR = ['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
const HUND_AR = { 1:'مئة',2:'مئتان',3:'ثلاثمئة',4:'أربعمئة',5:'خمسمئة',6:'ستمئة',7:'سبعمئة',8:'ثمانمئة',9:'تسعمئة' };
function below100Ar(n) {
  if (n < 20) return ONES_AR[n];
  const u = n%10, t = Math.floor(n/10);
  return u ? `${ONES_AR[u]} و${TENS_AR[t]}` : TENS_AR[t];
}
function below1000Ar(n) {
  if (n < 100) return below100Ar(n);
  const h = Math.floor(n/100), r = n%100;
  return HUND_AR[h] + (r ? ' و' + below100Ar(r) : '');
}
function toWordsArabic(n) {
  n = Math.floor(Number(n) || 0);
  if (n === 0) return 'صفر';
  if (n < 1000) return below1000Ar(n);
  if (n < 1000000) {
    const t = Math.floor(n/1000), r = n%1000;
    let w;
    if (t === 1) w = 'ألف';
    else if (t === 2) w = 'ألفان';
    else if (t >=3 && t <= 10) w = below1000Ar(t) + ' آلاف';
    else w = below1000Ar(t) + ' ألف';
    return w + (r ? ' و' + below1000Ar(r) : '');
  }
  const m = Math.floor(n/1000000), r = n%1000000;
  let w;
  if (m === 1) w = 'مليون';
  else if (m === 2) w = 'مليونان';
  else if (m >=3 && m <=10) w = below1000Ar(m) + ' ملايين';
  else w = below1000Ar(m) + ' مليون';
  return w + (r ? ' و' + toWordsArabic(r) : '');
}

// ---------- LOADER ----------
async function bootLoader() {
  const steps = [
    { pct: 20,  msg: 'Connecting to database…' },
    { pct: 45,  msg: 'Loading accounts…' },
    { pct: 65,  msg: 'Initializing security…' },
    { pct: 85,  msg: 'Verifying signatures…' },
    { pct: 100, msg: 'System ready ✓' },
  ];
  for (const s of steps) {
    $('loaderFill').style.width = s.pct + '%';
    $('loaderStatus').textContent = s.msg;
    await sleep(380);
  }
  await sleep(150);
  $('loader').classList.add('hidden');
  $('app').classList.remove('hidden');
}

function switchRole(role) {
  if (!ROLES[role]) return;
  STATE.role = role;
  const r = ROLES[role];
  $('userName').textContent = r.name;
  $('userRole').textContent = r.label;

}

async function navigate(panelId) {
  STATE.panel = panelId;
  renderSidebar();
  const main = $('main');
  main.innerHTML = '<div class="spinner-container"><div class="spinner"></div><div>Loading…</div></div>';
  await sleep(120);
  await renderPanel(panelId);
}

async function renderPanel(panelId) {
  const map = {
    drawerDash: renderDrawerDash,
    issueInstant: () => renderIssueForm('instant'),
    issueDeferred: () => renderIssueForm('deferred'),
    walletDrawer: () => renderWallet('drawer'),
    creditProfile: renderCredit,
    ceilingMgr: renderCeilingMgr,
    beneficiaryDash: renderBeneficiaryDash,
    receivedCheques: renderReceived,
    beneficiaryWallet: () => renderWallet('beneficiary'),
    bankDash: renderBankDash,
    approvals: renderApprovals,
    riskMonitor: renderRiskMonitor,
    centralData: renderCentralData,
  };
  const fn = map[panelId];
  if (!fn) {
    $('main').innerHTML = `<div class="page-head"><div class="page-head-text"><div class="page-eyebrow">404</div><h1 class="page-title">Panel not found</h1></div></div>`;
    return;
  }
  await fn();
  attachHandlers(panelId);
}

function attachHandlers(panelId) {
  if (panelId === 'issueInstant' || panelId === 'issueDeferred') {
    ['fAmount','fBene','fPurpose','fMaturity'].forEach(id => {
      const el = $(id);
      if (el) {
        el.addEventListener('input', updatePreview);
        el.addEventListener('change', updatePreview);
      }
    });
    updatePreview();
  }
}

function updatePreview() {
  const amt = parseFloat($('fAmount')?.value) || 0;
  const beneVal = $('fBene')?.value || '';
  const purpose = $('fPurpose')?.value || '';
  const maturity = $('fMaturity')?.value || '';

  if ($('prevAmt')) $('prevAmt').textContent = Number(amt).toLocaleString('en-US');
  if ($('prevWords')) $('prevWords').textContent = amt ? numberToWords(amt) + ' Jordanian Dinars Only' : '—';
  if ($('prevWordsAr')) $('prevWordsAr').textContent = amt ? toWordsArabic(amt) + ' دينار أردني لا غير' : '—';
  if ($('fAmountHint')) $('fAmountHint').textContent = amt ? numberToWords(amt) + ' Jordanian Dinars Only' : 'Amount in words appears here';

  if (beneVal && $('prevBene')) {
    const [, name, nameAr] = beneVal.split('|');
    $('prevBene').textContent = name || '—';
    if ($('prevBeneAr')) $('prevBeneAr').textContent = nameAr || '';
  }
  if ($('prevPurpose')) $('prevPurpose').textContent = purpose || '—';
  if ($('prevMaturity')) $('prevMaturity').textContent = fmtDate(maturity);
}

async function submitCheque(type) {
  const amt = parseFloat($('fAmount')?.value);
  const beneVal = $('fBene')?.value;
  const maturity = $('fMaturity')?.value;
  const purpose = $('fPurpose')?.value || '';

  if (!amt || amt <= 0) { showToast('⚠ Please enter a valid amount.'); return; }
  if (!beneVal) { showToast('⚠ Please select a beneficiary.'); return; }
  if (type === 'deferred' && !maturity) { showToast('⚠ Maturity date required.'); return; }

  const [beneId, beneName, beneAr] = beneVal.split('|');

  // Generate cheque number
  const seq = String(Math.floor(10000 + Math.random()*90000));
  const chequeNo = `ECH-2026-${seq}`;

  const cheque = {
    cheque_no: chequeNo,
    drawer_name: 'Abed Mehyar Group',
    drawer_ar: 'مجموعة عابد مهيار',
    drawer_id: 'ACC-001',
    beneficiary_name: beneName,
    beneficiary_ar: beneAr,
    beneficiary_id: beneId,
    amount: amt,
    type: type,
    issue_date: new Date().toISOString().split('T')[0],
    maturity_date: type === 'instant' ? new Date().toISOString().split('T')[0] : maturity,
    purpose: purpose || '—',
    status: 'active',
    hash: Array.from({length:12}, () => '0123456789ABCDEF'[Math.floor(Math.random()*16)]).join(''),
  };

  // Add to demo data so it shows up in wallets
  DEMO.cheques.unshift(cheque);

  showToast(`✓ Cheque ${chequeNo} issued`);
  await sleep(800);
  showChequePreview(cheque);
}

async function processApproval(id, decision, ceiling) {
  showToast(`⏳ Processing decision…`);
  await sleep(700);
  // Remove from approvals
  const idx = DEMO.approvals.findIndex(a => a.id === id);
  if (idx > -1) DEMO.approvals.splice(idx, 1);
  const msgs = {
    approved: `✓ Request ${id} approved · ceiling raised to ${fmtMoney(ceiling)}`,
    conditional: `✓ Request ${id} conditionally approved at 85% (${fmtMoney(ceiling)})`,
    rejected: `✗ Request ${id} rejected`,
  };
  showToast(msgs[decision]);
  await sleep(500);
  renderApprovals();
}

function downloadHTML() {
  const c = STATE.currentCheque;
  if (!c) return;
  const html = buildChequeStandaloneHTML(c);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${c.cheque_no}.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ Downloaded ${c.cheque_no}.html`);
}

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text(c.purpose || '—', W/2 + 4, 102, { maxWidth: W/2 - 12 });

  // Footer
  doc.setFillColor(241, 236, 224);
  doc.rect(0, H - 22, W, 22, 'F');
  doc.setDrawColor(232, 226, 210);
  doc.line(0, H - 22, W, H - 22);

  // Verify pill
  doc.setFillColor(214, 235, 226);
  doc.roundedRect(8, H - 16, 38, 8, 4, 4, 'F');
  doc.setTextColor(30, 111, 92);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'bold');
  doc.text('✓ VERIFIED · TAMPER-EVIDENT', 27, H - 10.5, { align: 'center' });

  // Hash
  doc.setTextColor(139, 134, 116);
  doc.setFont('courier', 'normal');
  doc.setFontSize(6);
  doc.text(`SHA-256 · ${c.hash || 'PENDING'}`, 50, H - 11);
  doc.text(`DS-${c.cheque_no.slice(-5)} · DIGITALLY SIGNED`, 50, H - 7);

  // Bank seal
  doc.setDrawColor(201, 169, 97);
  doc.setLineDashPattern([1, 1], 0);
  doc.circle(W - 14, H - 11, 6, 'D');
  doc.setLineDashPattern([], 0);
  doc.setTextColor(169, 137, 51);
  doc.setFont('times', 'bolditalic');
  doc.setFontSize(8);
  doc.text('JCB', W - 14, H - 10, { align: 'center' });
  doc.setFontSize(4);
  doc.setFont('helvetica', 'normal');
  doc.text('VERIFIED', W - 14, H - 7.5, { align: 'center' });

  // IP
  doc.setTextColor(184, 178, 154);
  doc.setFontSize(5);
  doc.setFont('helvetica', 'normal');
  doc.text('© Digital Check Ecosystem · Abdelqader Nayef Mehyar · Patent Pending · All Rights Reserved 2026', W/2, H - 1, { align: 'center' });

  doc.save(`${c.cheque_no}.pdf`);
  showToast(`✓ Downloaded ${c.cheque_no}.pdf`);
}

// ---------- INIT ----------
window.addEventListener('DOMContentLoaded', async () => {
  await bootLoader();
  switchRole('drawer');
});
</script>

</body>
